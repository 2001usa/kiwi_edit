version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: media_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-media_bot}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - media_net

  cache:
    image: redis:7-alpine
    container_name: media_cache
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - media_net

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - media_net

networks:
  media_net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
